name: CI

# Runs on every push and pull request. The job is gated only on the test
# suite; the linters (black / isort / flake8) run in informational mode for
# now so the pipeline stays green while the existing codebase is brought into
# style compliance in follow-up PRs. Once the repo is fully formatted, drop
# `continue-on-error` from the lint job to make the gate strict.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"
          python -m pip install pytest-cov

      - name: Show resolved environment
        run: |
          python --version
          python -c "import PySide6; print('PySide6', PySide6.__version__)"
          python -c "from src import __version__; print('app version', __version__)"

      - name: Run tests
        run: |
          python -m pytest -q --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: Lint (informational)
    runs-on: windows-latest
    # Lint findings should not block merging until the repo is bulk-formatted.
    # Removing this flag in a follow-up PR makes lint a hard gate.
    continue-on-error: true

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install lint tools
        # Reuse the [dev] extras so the linter versions stay in sync with
        # the ones developers run locally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Black --check
        run: python -m black --check src/ tests/
        continue-on-error: true

      - name: isort --check
        run: python -m isort --check src/ tests/
        continue-on-error: true

      - name: Flake8
        run: python -m flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 --count --statistics
        continue-on-error: true
