name: CI

# Runs on every push and pull request. Both jobs are required to pass:
#   * test  — the full pytest suite on Windows for Python 3.10/3.11/3.12.
#   * lint  — black --check, isort --check, flake8 (max-line-length=120,
#             config in `.flake8`).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"
          python -m pip install pytest-cov

      - name: Show resolved environment
        run: |
          python --version
          python -c "import PySide6; print('PySide6', PySide6.__version__)"
          python -c "from src import __version__; print('app version', __version__)"

      - name: Run tests
        run: |
          python -m pytest -q --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: Lint
    runs-on: windows-latest

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install lint tools
        # Reuse the [dev] extras so the linter versions stay in sync with
        # the ones developers run locally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Black --check
        run: python -m black --check src/ tests/

      - name: isort --check
        run: python -m isort --check src/ tests/

      - name: Flake8
        # Configuration lives in `.flake8` (max-line-length=120, ignores
        # E203/W503 to match Black). Keep CLI flags in sync with that file
        # if you change them.
        run: python -m flake8 src/ tests/ --count --statistics
